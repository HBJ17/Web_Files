<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Space Explorer Club</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <h1>Space Explorer Club</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="missions.html">Missions</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="join.html">Join Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Apply for Membership</h2>
        <form class="contact-form">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" required>

            <label for="interest">Area of Interest</label>
            <input type="text" id="interest" placeholder="e.g. Astrophysics, Rocketry">

            <label for="message">Why do you want to join?</label>
            <textarea id="message" rows="5" placeholder="Tell us about yourself"></textarea>

            <button type="submit">Submit Application</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Space Explorer Club. All rights Reserved.</p>
    </footer>
</body>

</html>
