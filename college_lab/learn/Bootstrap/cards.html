<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Cards Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h1 class="mb-4">Bootstrap Cards Demo</h1>

    <!-- 1. Basic Card -->
    <h3>Basic Card</h3>
    <div class="card" style="width: 18rem;">
        <div class="card-body">
            <h5 class="card-title">Simple Card</h5>
            <p class="card-text">This is a basic Bootstrap card.</p>
            <a href="#" class="btn btn-primary">Click</a>
        </div>
    </div>

    <hr>

    <!-- 2. Card with Image -->
    <h3>Card with Image</h3>
    <div class="card" style="width: 18rem;">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body">
            <h5 class="card-title">Image Card</h5>
            <p class="card-text">Card with image on top.</p>
        </div>
    </div>

    <hr>

    <!-- 3. Card Group -->
    <h3>Card Group</h3>
    <div class="card-group">
        <div class="card">
            <img src="https://via.placeholder.com/300" class="card-img-top">
            <div class="card-body">
                <h5 class="card-title">Card 1</h5>
                <p class="card-text">Some content</p>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" class="card-img-top">
            <div class="card-body">
                <h5 class="card-title">Card 2</h5>
                <p class="card-text">Some content</p>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" class="card-img-top">
            <div class="card-body">
                <h5 class="card-title">Card 3</h5>
                <p class="card-text">Some content</p>
            </div>
        </div>
    </div>

    <hr>

    <!-- 4. Cards in Grid -->
    <h3>Cards in Grid</h3>
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card A</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card B</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card C</div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
