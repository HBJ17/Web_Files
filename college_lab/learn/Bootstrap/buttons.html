<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Buttons Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h1 class="mb-4">Bootstrap Buttons Demo</h1>

    <!-- 1. Basic Buttons -->
    <h3>Basic Buttons</h3>
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-warning">Warning</button>

    <hr>

    <!-- 2. Button Group -->
    <h3>Button Group</h3>
    <div class="btn-group" role="group">
        <button class="btn btn-outline-primary">Left</button>
        <button class="btn btn-outline-primary">Middle</button>
        <button class="btn btn-outline-primary">Right</button>
    </div>

    <hr>

    <!-- 3. Toggle Buttons -->
    <h3>Toggle Buttons</h3>

    <!-- Checkbox toggle -->
    <input type="checkbox" class="btn-check">
    <label class="btn btn-outline-success">Toggle Me</label>

    <!-- Radio toggle -->
    <div class="btn-group mt-2">
        <input type="radio" class="btn-check" name="options" id="option1" checked>
        <label class="btn btn-outline-primary" for="option1">Option 1</label>

        <input type="radio" class="btn-check" name="options" id="option2">
        <label class="btn btn-outline-primary" for="option2">Option 2</label>
    </div>

    <hr>

    <!-- 4. Dropdown Menu -->
    <h3>Dropdown Menu</h3>

    <div class="dropdown">
        <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
            Menu
        </button>

        <ul class="dropdown-menu">
            <li><a class="dropdown-item text-danger" href="#">Action</a></li>
            <li><a class="dropdown-item text-warning" href="#">Another Action</a></li>
            <li><a class="dropdown-item text-primary" href="#">Something else</a></li>
        </ul>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
