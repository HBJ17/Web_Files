<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Media Object Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h1 class="mb-4">Bootstrap Media Objects</h1>

    <!-- 1. Basic Media Object -->
    <h3>Basic Media Object</h3>
    <div class="d-flex mb-4">
        <img src="https://via.placeholder.com/80" class="me-3 rounded" alt="image">
        <div>
            <h5>Media Heading</h5>
            <p>This is a simple media object using flex.</p>
        </div>
    </div>

    <!-- 2. Multiple Media Objects -->
    <h3>Multiple Media Objects</h3>
    <div class="d-flex mb-3">
        <img src="https://via.placeholder.com/80" class="me-3 rounded">
        <div>
            <h5>User 1</h5>
            <p>Some text for user 1.</p>
        </div>
    </div>

    <div class="d-flex mb-4">
        <img src="https://via.placeholder.com/80" class="me-3 rounded">
        <div>
            <h5>User 2</h5>
            <p>Some text for user 2.</p>
        </div>
    </div>

    <!-- 3. Nested Media Object -->
    <h3>Nested Media Object</h3>
    <div class="d-flex">
        <img src="https://via.placeholder.com/80" class="me-3 rounded">
        <div>
            <h5>Main Comment</h5>
            <p>This is a main comment.</p>

            <!-- Nested -->
            <div class="d-flex mt-3">
                <img src="https://via.placeholder.com/60" class="me-3 rounded">
                <div>
                    <h6>Reply</h6>
                    <p>This is a reply.</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
