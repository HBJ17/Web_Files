<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Components Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h1 class="mb-4">Bootstrap Components</h1>

    <!-- 1. List Group -->
    <h3>List Group</h3>
    <ul class="list-group mb-4">
        <li class="list-group-item">Item 1</li>
        <li class="list-group-item active">Item 2 (Active)</li>
        <li class="list-group-item">Item 3</li>
    </ul>

    <!-- 2. Progress Bar -->
    <h3>Progress Bar</h3>
    <div class="progress mb-4">
        <div class="progress-bar bg-success" style="width: 70%;">
            70%
        </div>
    </div>

    <!-- 3. Popover -->
    <h3>Popover</h3>
    <button type="button" class="btn btn-info mb-4"
        data-bs-toggle="popover"
        title="Popover Title"
        data-bs-content="This is a popover message">
        Click for Popover
    </button>

    <!-- 4. Spinners -->
    <h3>Spinners</h3>
    <div class="spinner-border text-primary"></div>
    <div class="spinner-border text-danger"></div>
    <div class="spinner-grow text-success"></div>

    <br><br>

    <!-- 5. Colors -->
    <h3>Colors</h3>
    <p class="text-primary">Primary text</p>
    <p class="text-success">Success text</p>
    <p class="text-danger">Danger text</p>

    <div class="p-3 mb-2 bg-primary text-white">Primary background</div>
    <div class="p-3 mb-2 bg-warning text-dark">Warning background</div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Enable Popover -->
    <script>
        var popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
        popoverTriggerList.forEach(function (el) {
            new bootstrap.Popover(el);
        });
    </script>

</body>
</html>
