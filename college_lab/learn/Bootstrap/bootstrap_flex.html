<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Flex Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h1 class="mb-4">Bootstrap Flexbox</h1>

    <!-- 1. Basic Flex -->
    <h3>Basic Flex (Row)</h3>
    <div class="d-flex bg-light p-3 mb-4">
        <div class="p-2 bg-primary text-white">Item 1</div>
        <div class="p-2 bg-success text-white">Item 2</div>
        <div class="p-2 bg-danger text-white">Item 3</div>
    </div>

    <!-- 2. Flex Column -->
    <h3>Flex Column</h3>
    <div class="d-flex flex-column bg-light p-3 mb-4">
        <div class="p-2 bg-primary text-white">Item 1</div>
        <div class="p-2 bg-success text-white">Item 2</div>
        <div class="p-2 bg-danger text-white">Item 3</div>
    </div>

    <!-- 3. Justify Content -->
    <h3>Justify Content (Space Between)</h3>
    <div class="d-flex justify-content-between bg-light p-3 mb-4">
        <div class="p-2 bg-primary text-white">Left</div>
        <div class="p-2 bg-success text-white">Center</div>
        <div class="p-2 bg-danger text-white">Right</div>
    </div>

    <!-- 4. Align Items -->
    <h3>Align Items (Center)</h3>
    <div class="d-flex align-items-center bg-light p-3 mb-4" style="height: 100px;">
        <div class="p-2 bg-primary text-white">Item 1</div>
        <div class="p-2 bg-success text-white">Item 2</div>
    </div>

    <!-- 5. Gap -->
    <h3>Flex with Gap</h3>
    <div class="d-flex gap-3 bg-light p-3">
        <div class="p-2 bg-primary text-white">Item 1</div>
        <div class="p-2 bg-success text-white">Item 2</div>
        <div class="p-2 bg-danger text-white">Item 3</div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
