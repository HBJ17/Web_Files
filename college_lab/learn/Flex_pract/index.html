<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Flexbox Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>My Simple Website</h1>
    </header>

    <main class="container">

        <div class="card">
            <h2>Card 1</h2>
            <p>
                This is the first card. You can place any content here like text,
                images, or links.
            </p>
        </div>

        <div class="card">
            <h2>Card 2</h2>
            <p>
                This is the second card. Flexbox makes it easy to place cards
                side by side.
            </p>
        </div>

    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>

</html>
