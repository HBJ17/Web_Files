<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Temperature Converter</h1>
    </header>

    <main>
        <input type="number" placeholder="Enter value" id="temp">
        <button class="btn btn-success" onclick="fToOthers()">Fahrenheit to Celsius and Kelvin</button>
        <button class="btn btn-warning" onclick="cToOthers()">Celsius to Fahrenheit and Kelvin</button>
        <button class="btn btn-danger" onclick="kToOthers()">Kelvin to Celsius and Fahrenheit</button>
        <div id="result">
            <h3>Result will appear here....</h3>
        </div>
    </main>

    <footer>
        <h4> &copy - Temperature Converter </h4>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
