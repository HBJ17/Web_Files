<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Portal</title>
</head>

<body>
    <header>
        <h1><b>Student Registration Portal</b></h1>
        <p>Kindly, fill in the form given below</p>
    </header>

    <main>
        <form>
            <section>
                <hr>
                <h2>Personal Information</h2>
                <hr>

                <label>Enter Your Fullname = </label>
                <input type="text" placeholder="Name">
                <br><br>

                <label>Email Address = </label>
                <input type="email" placeholder="Email">
                <br><br>

                <label>Enter password = </label>
                <input type="password" placeholder="Password">
                <br><br>

                <label>Select your gender = </label>
                <input type="radio" name="gender">
                <label>Male</label>

                <input type="radio" name="gender">
                <label>Female</label>

                <input type="radio" name="gender">
                <label>Other</label>
                <br><br>

                <label >Date of Birth:</label>
                <input type="date" name="dob">
                <br><br>

                <label >Phone Number:</label>
                <input type="tel" placeholder="10-digit number">
                <br><br>
            </section>

            <section>
                <hr>
                <h2>Academic Information</h2>
                <hr>

                <label>Select Course:</label>
                <select>
                    <option value="">--Select Course--</option>
                    <option value="CSE">B.E CSE</option>
                    <option value="ECE">B.E ECE</option>
                    <option value="EEE">B.E EEE</option>
                    <option value="IT">B.tech IT</option>
                    <option value="BCom">Bcom</option>
                </select>
                <br><br>

                <label>Skills:</label><br>
                <input type="checkbox">
                <label for="html">HTML</label>

                <input type="checkbox">
                <label for="css">CSS</label>

                <input type="checkbox">
                <label for="js">JavaScript</label>

                <input type="checkbox">
                <label for="python">Python</label>
                <br><br>
            </section>

            <section>
                <hr>
                <h2>Additional Information</h2>
                <hr>

                <label>Address:</label><br>
                <textarea rows="4" cols="40" maxlength="250" placeholder="Enter your address"></textarea>
                <br><br>

                <label>Upload Profile Picture:</label>
                <input type="file">
                <br><br>

                <input type="checkbox">
                <label>I agree to the Terms and Conditions</label>
                <br><br>
            </section>

            <section>
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </section>

        </form>
    </main>
    
    <footer>
        <hr>
        <p>Contact us: studentportal@gmail.com | Phone: 1233456789</p>
        <p>&copy; 2026 Student Registration Portal</p>
        <hr>
    </footer>


            </section>
        </form>
    </main>
</body>

</html>
