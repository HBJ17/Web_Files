<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Emergence AI Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">Emergency AI</div>

    <div class="container">

        <!-- queue tab -->
        <div class="queue">
            <h3>Priority Queue</h3>
            <div id="queueList"></div>
        </div>

        <!-- right panel -->
        <div class="right">

            <!-- ongoing call -->
            <div class="call-card">
                <h3>Ongoing Call</h3>
                <p><b>Name:</b> <span id="callerName">None</span></p>
                <p><b>Emotion:</b> <span id="callerEmotion">-</span></p>
                <button onclick="hangup()" class="hangup-btn">Hang Up</button>
                <button id="switchTellerBtn" onclick="switchTeller()" class="switch-btn">Switch Teller</button>
            </div>

            <!-- notes -->
            <div class="notes">
                <h3>Notes</h3>
                <textarea id="notesArea" placeholder="Write notes here..."></textarea>
                <div class="notes-footer">
                    <button onclick="clearNotes()" class="clear-btn">Clear</button>
                    <button onclick="exportNotes()" class="export-btn">Export .txt</button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
